description: 'In CATAN (formerly The Settlers of Catan), players try to be the dominant
  force on the island of Catan by building settlements, cities and roads. On each
  turn dice are rolled to determine which resources the island produces. Players build
  structures by ''spending'' resources (sheep, wheat, wood, brick and ore) which are
  represented by the relevant resource cards; each land type, with the exception of
  the unproductive desert, produces a specific resource: hills produce brick, forests
  produce wood, mountains produce ore, fields produce wheat, and pastures produce
  sheep.


  Set-up includes randomly placing large hexagonal tiles (each depicting one of the
  five resource-producing terrain types--or the desert) in a honeycomb shape and surrounding
  them with water tiles, some of which contain ports of exchange. A number disk, the
  value of which will correspond to the roll of two 6-sided dice, are placed on each
  terrain tile. Each player is given two settlements (think: houses) and roads (sticks)
  which are placed on intersections and borders of the terrain tiles. Players collect
  a hand of resource cards based on which terrain tiles their last-placed settlement
  is adjacent to. A robber pawn is placed on the desert tile.


  A turn consists of rolling the dice, collecting resource cards based on this dice
  roll and the position of settlements (or upgraded cities&mdash;think: hotels), turning
  in resource cards (if possible and desired) for improvements, trading cards at a
  port, possibly playing a development card, or trading resource cards with other
  players. If the dice roll is a 7, the active player moves the robber to a new terrain
  tile and steals a resource card from another player who has a settlement adjacent
  to that tile.


  Points are accumulated by building settlements and cities, having the longest road
  or the largest army (from some of the development cards), and gathering certain
  development cards that simply award victory points. When a player has gathered 10
  points (some of which may be held in secret), s/he announces this and claims the
  win.


  '
description_ja: '「カタン」（旧名「カタンの開拓者たち」）では、プレイヤーは開拓地、都市、道路を建設し、カタン島で最も有力な勢力になることを目指します。各ターンでは、サイコロを振って島がどの資源を産出するかを決定します。プレイヤーは、資源カードで表される資源（羊、小麦、木材、レンガ、鉱石）を「消費」して建物を建設します。不毛の砂漠を除き、土地の種類ごとに特定の資源が産出されます。丘陵はレンガ、森林は木材、山地は鉱石、畑は小麦、牧草地は羊を産出します。


  ゲームの準備として、五種類の資源を産出する地形（または砂漠）が描かれた大きな六角形のタイルをハニカム状にランダムに配置し、それらを水タイルで囲みます。水タイルの一部には、交換用の港が含まれています。二つの6面サイコロの出目に対応する数字ディスクを各地形タイルに配置します。各プレイヤーは二つの開拓地（家のようなもの）と道路（棒のようなもの）を与えられ、それらを地形タイルの交差点と境界線に配置します。プレイヤーは、最後に配置した開拓地が隣接する地形タイルに基づいて資源カードを手に入れます。盗賊コマは砂漠タイルに配置されます。


  ターンは、サイコロを振る、このサイコロの出目と開拓地（またはアップグレードされた都市、ホテルのようなもの）の位置に基づいて資源カードを入手する、改善のために資源カードを（可能であれば、希望すれば）差し出す、港でカードを取引する、開発カードをプレイする、または他のプレイヤーと資源カードを取引することで構成されます。サイコロの出目が7の場合、アクティブプレイヤーは盗賊を新しい地形タイルに移動させ、そのタイルに隣接する開拓地を持つ別のプレイヤーから資源カードを盗みます。


  ポイントは、開拓地や都市の建設、最長の道または最大の軍隊（一部の開発カードから）、そして勝利ポイントを単純に与える特定の開発カードを集めることによって蓄積されます。プレイヤーが10ポイント（その一部は秘密に保持されている可能性があります）を集めた場合、それを発表して勝利を主張します。'
