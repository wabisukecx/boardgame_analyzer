description: 'How well can you play the same cards as someone else?


  In the first round of LOOP, each player receives a hand of eleven cards from a deck
  of three suits, with each suit having cards numbered 1-15. They each choose two
  cards to set aside face down.


  The lead player starts the first trick by laying down a single card, a pair of the
  same number, or two or more consecutive cards of the same suit. The next players
  in turn must play a higher matching combination of cards or pass, although a player
  who passes can re-enter the trick later. Once everyone passes, the player who won
  the trick leads again. (Note that all played cards stay in front of who played them.)


  If a player lays down an 8, whether alone or in combination, everyone else must
  pass, then this player leads a new trick. If a player runs out of cards, they score
  points based on how many players still have cards in hand, and play continues until
  all but one player goes out.


  The last player then takes over a player''s seat: first in a two-player game, second
  in a three-player game, and first or second in a four-player game (with the third
  player then taking the other option). After moving to their new locations, players
  then take the eleven cards in front of them, discard two, then play the round again.
  If the player in the fourth seat can do better than fourth, they score points &mdash;
  lots of points if they come in first. Along the same lines, if the player in the
  first seat does poorly, they lose points.


  If a player has set aside an 8 in their two cards, they can declare "どんでん" (donden
  = revolution) by revealing the card on their turn. Now 1s are the high cards and
  15s the low ones for the remainder of the round.


  Play multiple rounds until a player has reached the point threshold, which is based
  on the player count.


  '
description_ja: 'あなたは他人と同じようにカードをうまく使えるでしょうか？


  『LOOP』の最初のラウンドでは、各プレイヤーは3つのスート（各スートは1から15の番号付きカード）のデッキから11枚のカードを受け取ります。各プレイヤーは2枚のカードを選んで裏向きに脇に置きます。


  最初のプレイヤーは、1枚のカード、同じ数字のペア、または同じスートの2枚以上の連続したカードを出すことで最初のトリックを開始します。次のプレイヤーは順番に、より強い組み合わせのカードを出すか、パスしなければなりません。ただし、パスしたプレイヤーは後でトリックに再び参加できます。全員がパスすると、トリックに勝ったプレイヤーが再びリードします。（プレイされたカードはすべて、プレイしたプレイヤーの前に置かれることに注意してください。）


  プレイヤーが8を単独で、または組み合わせて出した場合、他の全員はパスしなければならず、その後、そのプレイヤーが新しいトリックをリードします。プレイヤーがカードを使い果たした場合、手札にカードが残っているプレイヤーの数に基づいて得点し、1人を除くすべてのプレイヤーがカードを使い果たすまでプレイが続きます。


  最後のプレイヤーは、他のプレイヤーの席を引き継ぎます。2人プレイの場合は最初、3人プレイの場合は2番目、4人プレイの場合は最初または2番目です（3番目のプレイヤーがもう一方のオプションを取ります）。新しい場所に移動した後、プレイヤーは自分の前に置かれた11枚のカードを取り、2枚を捨て、再びラウンドをプレイします。4番目の席のプレイヤーが4位よりも良い成績を収めた場合、ポイントを獲得します。特に1位になった場合は大量のポイントを獲得できます。同様に、最初の席のプレイヤーの成績が悪い場合、ポイントを失います。


  プレイヤーが2枚の脇に置いたカードの中に8を持っている場合、自分のターンにカードを公開して「どんでん」を宣言できます。このラウンドの残りの期間、1が最も強いカード、15が最も弱いカードになります。


  プレイヤー数が基準とするポイント閾値に達するまで、複数のラウンドをプレイします。'
