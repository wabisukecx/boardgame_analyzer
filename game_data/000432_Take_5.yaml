description: 'In Take 5, a.k.a. 6 nimmt!, Category 5 and many other names, you want
  to score as few points as possible.


  To play the game, you shuffle the 104 number cards, lay out four cards face-up to
  start the four rows, then deal ten cards to each player. Each turn, players simultaneously
  choose and reveal a card from their hand, then add the cards to the rows, with cards
  being placed in ascending order based on their number; specifically, each card is
  placed in the row that ends with the highest number that''s below the card''s number.
  When the sixth card is placed in a row, the owner of that card claims the other
  five cards and the sixth card becomes the first card in its row.


  In addition to a number from 1 to 104, each card has a point value. After finishing
  ten rounds, players tally their score and see whether the game ends. (Category 5
  ends when a player has a score greater than 74, for example, while 6 nimmt! ends
  when someone tops 66.) When this happens, the player with the fewest points wins!


  6 nimmt! works with 2-10 players, and the dynamics of gameplay change the more players
  that you have. One variant for the game has you use only the lowest 34 cards, 44
  cards, 54 cards, etc. (instead of all 104 cards) when you have three, four, five,
  etc. players. This change allows you to know exactly which cards are in play, thereby
  allowing you to track which cards have been played and know what to expect so that
  you can (theoretically) make better choices as to which card to play when.


  '
description_ja: 'テイク5（別名：6 nimmt!、Category 5など）では、できるだけ少ない点数を獲得することを目指します。


  ゲームを始めるには、104枚の数字カードをシャッフルし、4枚を表向きにして4列を作り、各プレイヤーに10枚ずつカードを配ります。各ターン、プレイヤーは手札から1枚のカードを選んで同時に公開し、カードを数字の昇順に列に追加していきます。具体的には、各カードは、そのカードの数字よりも小さい最大の数字で終わる列に配置されます。6枚目のカードが列に置かれた場合、そのカードの所有者は他の5枚のカードを獲得し、6枚目のカードがその列の最初のカードになります。


  1から104までの数字に加えて、各カードには点数が割り当てられています。10ラウンド終了後、プレイヤーは合計点を計算し、ゲームが終了するかどうかを確認します。（例えば、Category
  5はプレイヤーの点数が74を超えると終了し、6 nimmt!は誰かが66を超えると終了します。）そうなった場合、最も点数が少ないプレイヤーが勝ちとなります！


  6 nimmt!は2〜10人で遊ぶことができ、プレイヤー数が多いほどゲームの展開が変化します。ゲームのバリアントとして、3人、4人、5人などの場合、すべての104枚のカードではなく、最も低い34枚、44枚、54枚などのカードのみを使用する方法があります。この変更により、どのカードが使用されているかを正確に把握し、どのカードがプレイされたかを追跡し、何を期待できるかを知ることができるため、（理論的には）どのカードをプレイするかについてより良い選択ができるようになります。'
