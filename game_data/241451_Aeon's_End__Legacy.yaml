description: '&ldquo;You are not breach mages yet,&rdquo; Brama lectures as she paces
  down the line of students, her frail form belying her immense power. &ldquo;Breach
  mages have protected us since the beginning &mdash; since the burning of the world
  and our pilgrimage into the dark. It was they who founded Gravehold, our last bastion,
  and if you wish to stand beside these living legends, you must listen and learn.
  The Nameless shall come again, as they always have, and you will need to be ready.
  You are the hope of our future.&rdquo;


  As a young apprentice, you grew up to stories of the breach mages. Brama, the teacher,
  wisest of the mages. Dezmodia, the prodigy, master of great magic. Mist, the stoic
  leader and tactical genius. Malastar, the magical craftsman. Rebellious, powerful,
  and reckless perfectly sum up Xaxos. These mages are your heroes and tomorrow, after
  your ordeal, you will join their ranks.


  &ldquo;Each of you must overcome your ordeal to learn discipline and focus, the
  tools you will need to defend Gravehold. We are nothing without Gravehold. To be
  a breach mage is to sacrifice your life for Gravehold. When you die, it will be
  in defense of our city. Once you understand this universal truth...only then will
  you be ready to become a breach mage.&rdquo;


  Aeon''s End is not required to play Aeon''s End: Legacy.


  '
description_ja: '「お前たちはまだ裂け目魔術師ではない」 ブロマはそう言いながら、生徒たちの列を歩き回る。そのか弱い体つきからは想像もできないほどの強大な力を秘めている。「裂け目魔術師は、世界の炎上と我々の暗闇への巡礼以来、最初から我々を守ってきた。彼らは最後の砦であるグレイブホールドを築いた者たちであり、もし生ける伝説である彼らの仲間入りを望むなら、よく聞き、学びなさい。名もなき者たちは必ず再び現れる。いつもそうであるように。お前たちは我々の未来の希望なのだ。」


  若き見習いとして、あなたは裂け目魔術師たちの物語を聞いて育った。師であるブロマは、魔術師の中でも最も賢い。神童デズモディアは、偉大な魔法の使い手。ストイックな指導者であり戦術の天才であるミスト。魔法の職人マラスタ。反抗的で、力強く、無謀。ザクソスを完璧に言い表している。これらの魔術師たちはあなたのヒーローであり、明日、試練を終えれば、あなたも彼らの仲間入りを果たすのだ。


  「お前たち一人一人が、グレイブホールドを守るために必要な道具である規律と集中力を学ぶために、試練を乗り越えなければならない。グレイブホールドなしでは、我々は無力だ。裂け目魔術師であるということは、グレイブホールドのために命を捧げるということだ。お前たちが死ぬ時は、我々の都市を守るためだ。この普遍的な真実を理解した時...その時初めて、お前たちは裂け目魔術師になる準備ができたと言えるだろう。」


  『Aeon''s End: Legacy』をプレイするのに『Aeon''s End』は必要ありません。'
