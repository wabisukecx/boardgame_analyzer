description: 'Keyflower is a game for two to six players played over four rounds.
  Each round represents a season: spring, summer, autumn, and finally winter. Each
  player starts the game with a "home" tile and an initial team of eight workers,
  each of which is colored red, yellow, or blue. Workers of matching colors are used
  by the players to bid for tiles to add to their villages. Matching workers may alternatively
  be used to generate resources, skills and additional workers, not only from the
  player''s own tiles, but also from the tiles in the other players'' villages and
  from the new tiles being auctioned.


  In spring, summer and autumn, more workers will arrive on board the Keyflower and
  her sister boats, with some of these workers possessing skills in the working of
  the key resources of iron, stone and wood. In each of these seasons, village tiles
  are set out at random for auction. In the winter no new workers arrive and the players
  select the village tiles for auction from those they received at the beginning of
  the game. Each winter village tile offers VPs for certain combinations of resources,
  skills and workers. The player whose village and workers generate the most VPs wins
  the game.


  Keyflower presents players with many different challenges and each game will be
  different due to the mix of village tiles that appear in that particular game. Throughout
  the game, players will need to be alert to the opportunities to best utilize their
  various resources, transport and upgrade capability, skills and workers.


  Keyflower, a joint design between Richard Breese and Sebastian Bleasdale, is the
  seventh game in the "Key" series from R&D Games set in the medieval "Key" land.


  '
description_ja: 'キーフラワーは2人から6人で遊ぶゲームで、4ラウンドにわたって行われます。各ラウンドは春、夏、秋、そして最後の冬と、それぞれの季節を表します。各プレイヤーは「ホーム」タイルと、赤、黄、青のいずれかの色の労働者8人でゲームを開始します。同じ色の労働者は、自分の村に追加するタイルの入札に使用されます。また、同じ色の労働者は、プレイヤー自身のタイルだけでなく、他のプレイヤーの村のタイルやオークションに出されている新しいタイルからも、資源、スキル、追加の労働者を生み出すためにも使用できます。


  春、夏、秋には、キーフラワー号とその姉妹船にさらに多くの労働者が到着します。これらの労働者の中には、鉄、石、木といった主要な資源の加工スキルを持つ者もいます。これらの季節ごとに、村のタイルがランダムにオークションに出されます。冬には新しい労働者は到着せず、プレイヤーはゲーム開始時に受け取った村のタイルの中から、オークションに出すタイルを選びます。各冬の村タイルは、特定の資源、スキル、労働者の組み合わせに対して勝利点（VP）を提供します。村と労働者から最も多くのVPを生み出したプレイヤーがゲームに勝利します。


  キーフラワーはプレイヤーに多くの異なる課題を与え、ゲームに登場する村のタイルの組み合わせによって、各ゲームは異なった展開を見せます。ゲームを通して、プレイヤーは様々な資源、輸送・アップグレード能力、スキル、労働者を最大限に活用する機会に常に注意を払う必要があります。


  リチャード・ブリーズとセバスチャン・ブリーズデールの共同デザインであるキーフラワーは、R&D Gamesによる中世の「Key」の世界を舞台にした「Key」シリーズの7番目のゲームです。'
