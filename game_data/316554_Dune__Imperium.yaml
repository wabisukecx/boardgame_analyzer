description: 'Dune: Imperium is a game that uses deck building to add a hidden information
  angle to traditional worker placement. It finds inspiration in elements and characters
  from the Dune legacy, both the new film from Legendary Pictures and the seminal
  literary series from Frank Herbert, Brian Herbert, and Kevin J. Anderson.


  As a leader of one of the Great Houses of the Landsraad, raise your banner and marshal
  your forces and spies. War is coming, and at the center of the conflict is Arrakis
  &ndash; Dune, the desert planet.


  You start with a unique leader card, as well as a deck identical to those of your
  opponents.  As you acquire cards and build your deck, your choices will define your
  strengths and weaknesses. Cards allow you to send your Agents to certain spaces
  on the game board, so how your deck evolves affects your strategy. You might become
  more powerful militarily, able to deploy more troops than your opponents. Or you
  might acquire cards that give you an edge with the four political factions represented
  in the game: the Emperor, the Spacing Guild, the Bene Gesserit, and the Fremen.


  Unlike many deck building games, you don&rsquo;t play your entire hand in one turn.
  Instead, you draw a hand of cards at the start of every round and alternate with
  other players, taking one Agent turn at a time (playing one card to send one of
  your Agents to the game board). When it&rsquo;s your turn and you have no more Agents
  to place, you&rsquo;ll take a Reveal turn, revealing the rest of your cards, which
  will provide Persuasion and Swords. Persuasion is used to acquire more cards, and
  Swords help your troops fight for the current round&rsquo;s rewards as shown on
  the revealed Conflict card.


  Defeat your rivals in combat, shrewdly navigate the political factions, and acquire
  precious cards. The Spice must flow to lead your House to victory!


  Some important links: The Official FAQ, the Unofficial FAQ, and an Automa (solo
  and 2p) Overview


  '
description_ja: '『Dune: Imperium』は、デッキ構築の要素を取り入れ、ワーカープレイスメントに隠された情報という新たな角度を加えたゲームです。レジェンダリー・ピクチャーズの最新映画と、フランク・ハーバート、ブライアン・ハーバート、ケビン・J・アンダーソンの文学シリーズという、『Dune』の遺産から要素やキャラクターを取り入れています。


  Landsraad（諸侯連合）の名門家のリーダーとして、旗を掲げ、軍隊とスパイを動員しましょう。戦いが迫っており、紛争の中心は砂漠の惑星、アラキス――デューンです。


  ゲーム開始時、プレイヤーは固有のリーダーカードと、他のプレイヤーと同一のデッキを受け取ります。カードを獲得し、デッキを構築するにつれて、その選択があなたの強みと弱みを決定します。カードを使用することで、ゲームボード上の特定の場所にエージェントを派遣できます。そのため、デッキの進化はあなたの戦略に影響を与えます。軍事力を強化し、対戦相手よりも多くの部隊を配備できるようになるかもしれません。あるいは、ゲームに登場する4つの政治勢力、皇帝、宇宙ギルド、ベネ・ゲセリット、フレメンとの関係で優位に立てるカードを獲得するかもしれません。


  多くのデッキ構築ゲームとは異なり、1ターンに手札をすべてプレイするわけではありません。代わりに、各ラウンドの開始時に手札を引き、他のプレイヤーと交互に、一度に1つのエージェントターン（1枚のカードをプレイして、エージェントをゲームボードに派遣する）を行います。自分のターンになり、配置するエージェントがいなくなると、リビールターンとなり、残りのカードを公開します。これらのカードは、説得力と剣を提供します。説得力はより多くのカードを獲得するために使用され、剣は公開されたコンフリクトカードに示された、そのラウンドの報酬を求めて戦うあなたの部隊を助けます。


  戦闘でライバルを打ち負かし、政治勢力を巧みに操り、貴重なカードを獲得しましょう。あなたの家を勝利に導くには、スパイスの流れを絶やさないことです！'
