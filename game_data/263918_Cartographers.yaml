description: 'Queen Gimnax has ordered the reclamation of the northern lands. As a
  cartographer in her service, you are sent to map this territory, claiming it for
  the Kingdom of Nalos. Through official edicts, the queen announces which lands she
  prizes most, and you will increase your reputation by meeting her demands. But you
  are not alone in this wilderness. The Dragul contest your claims with their outposts,
  so you must draw your lines carefully to reduce their influence. Reclaim the greatest
  share of the queen&rsquo;s desired lands and you will be declared the greatest cartographer
  in the kingdom.


  In Cartographers: A Roll Player Tale, players compete to earn the most reputation
  stars by the time four seasons have passed. Each season, players draw on their map
  sheets and earn reputation by carrying out the queen''s edicts before the season
  is over. The player with the most reputation stars at the end of winter wins!


  &mdash;description from the publisher


  '
description_ja: 'ギムナクス女王は北方領土の開拓を命じました。女王に仕える地図製作者であるあなたは、ナロス王国のためにこの土地を地図に描き、領有を主張するよう派遣されます。女王は勅令を通じて、最も重視する土地を発表し、あなたは女王の要求を満たすことで名声を高めます。しかし、この荒野にいるのはあなただけではありません。ドラグル族が前哨基地であなたの領有権に異議を唱えるため、彼らの影響力を減らすために慎重に線を引く必要があります。女王が望む土地を最も多く開拓し、王国で最も偉大な地図製作者として宣言されましょう。


  『カートグラファーズ：ロールプレイヤー物語』では、プレイヤーは4つの季節が終わるまでに最も多くの名声スターを獲得することを競います。各季節、プレイヤーは自分のマップシートに描き込み、季節が終わるまでに女王の勅令を実行することで名声を獲得します。冬が終わった時点で最も多くの名声スターを持つプレイヤーが勝利です！'
