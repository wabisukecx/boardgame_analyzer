description: 'Luthier transports players to the height of classical music in Western
  Europe, when the art of the instrument was upheld equally by skilled craftspeople,
  noble patrons, virtuoso performers, and famous composers such as Bach, Mozart, and
  Beethoven.


  Using a new, unique combination of hidden bidding and worker placement, players
  manage resources to craft various musical instruments in their workshop, while also
  courting actual historic patrons through an ever-changing personal tableau of actions
  and bonuses. Each player chooses how to balance improving skills across multiple
  tracks, unlocking specialized worker abilities and other bonuses. The choice to
  concentrate on varying gameplay strategies and goals, such as musical performances,
  instrument building and repairs, apprentice training and workshop expansion, and
  overall reputation as an instrument maker, provide multiple paths to victory.


  Luthier finds true harmony through an authentic and original marriage of theme and
  mechanisms, resulting in a rich gameplay experience that equally speaks to both
  the strategic gamer and the classical music lover.


  &mdash;description from the publisher


  '
description_ja: '弦楽器職人（ルシアー）は、プレイヤーを西ヨーロッパのクラシック音楽全盛期へと誘います。その時代、楽器製作の技術は、熟練した職人、高貴なパトロン、熟達した演奏家、そしてバッハ、モーツァルト、ベートーヴェンのような著名な作曲家によって支えられていました。


  隠された入札とワーカープレイスメントという他に類を見ない組み合わせを用いて、プレイヤーは工房で様々な楽器を製作するために資源を管理し、変化し続けるアクションとボーナスが組み合わされた個人用ボード上で、歴史上の実在のパトロンたちに取り入ります。各プレイヤーは、複数のスキルを向上させ、特殊なワーカー能力やその他のボーナスをアンロックする方法をバランス良く選択します。音楽演奏、楽器の製作と修理、見習いの育成、工房の拡張、そして楽器製作者としての総合的な評判など、多様なプレイスタイル戦略と目標に集中することで、勝利への道は複数存在します。


  弦楽器職人は、テーマとメカニズムの真正かつ独創的な融合を通じて、真の調和を見出しており、戦略ゲーマーとクラシック音楽愛好家の両方に響く豊かなゲーム体験を提供します。'
