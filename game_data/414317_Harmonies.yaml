description: 'In Harmonies, build landscapes by placing colored tokens and create
  habitats for your animals. To earn the most points and win the game, incorporate
  the habitats in your landscapes wisely and have as many animals as you can settle
  there.


  Starting with the first player and proceeding clockwise, each player will choose
  a set of 3 terrain tokens from the central area to place on their personal board.
  They may optionally choose an Animal card from the 5 displayed and/or place an Animal
  cube from their Animal card(s) on any completed patterns on their board that match
  their personal Animal cards. There is a 4-card limit per player. After their turn,
  refill with a new set of 3 tokens and a new Animal card if needed.


  Placement of the terrain tokens will depend on the personal Animal card goals, and
  scoring rules for the various terrain types (mountain, field, forest, etc). For
  example, mountain tiles score based on how high they are (1 tile scores 1, while
  3 tiles stacked score 7), but the mountain scores zero if it is not adjacent to
  at least one other mountain. If all the cubes on a given Animal card have been placed,
  the card is set aside and a new card can be drawn. The cards are scored at game
  end based on the highest number that isn''t covered by a cube.


  The games ends when there are no tokens left in the bag to refill the central area,
  or at least one players has 2 or fewer empty spaces on their player board. Play
  continues until all players have had an equal turn that round. The player with the
  highest points is the winner.


  Optionally, you can use Nature''s Spirit cards for richer gameplay. During setup,
  each player chooses 1 of 2 spirit cards and places a Spirit cube on the card. They
  follow the same placement rules as Animal cards, but tend to have an ongoing effect
  once completed. The spirit card does count towards the 4-card hand limit.


  &mdash;description from the publisher


  '
description_ja: '『ハーモニー』では、色のついたトークンを配置して地形を作り、動物たちの生息地を創り出します。最も多くの得点を獲得してゲームに勝利するには、生息地を賢く地形に組み込み、できるだけ多くの動物をそこに定住させましょう。


  最初のプレイヤーから時計回りに、各プレイヤーは中央エリアから3つの地形トークンのセットを選び、自分の個人ボードに配置します。任意で、公開されている5枚の動物カードから1枚を選び、かつ/または自分の動物カードに一致する完成したパターンがある場合、そのパターン上に動物カードから動物キューブを配置できます。プレイヤーは4枚までしか動物カードを持つことができません。自分のターンが終わったら、必要に応じて新しい3つのトークンセットと新しい動物カードを補充します。


  地形トークンの配置は、個人の動物カードの目標や、様々な地形タイプ（山、草原、森など）の得点ルールによって決まります。例えば、山のタイルは、その高さに基づいて得点が入ります（1つのタイルは1点、3つのタイルを積み重ねると7点）。ただし、山は、少なくとも1つの他の山に隣接していない場合は0点になります。特定の動物カード上のすべてのキューブが配置された場合、そのカードは脇に置かれ、新しいカードを引くことができます。カードは、キューブで覆われていない最大の数に基づいてゲーム終了時に得点が入ります。


  中央エリアを補充するためのトークンが袋の中に残っていない場合、または少なくとも1人のプレイヤーの個人ボードに2つ以下の空きスペースしかない場合、ゲームは終了します。そのラウンドで全てのプレイヤーが同回数プレイするまでゲームは続行されます。最も高い得点を獲得したプレイヤーが勝者です。


  オプションとして、より豊かなゲームプレイのために自然の精霊カードを使用できます。セットアップ中、各プレイヤーは2枚の精霊カードから1枚を選び、カードに精霊キューブを配置します。精霊カードは動物カードと同じ配置ルールに従いますが、完成すると継続的な効果を発揮する傾向があります。精霊カードは4枚のカード制限に含まれます。'
