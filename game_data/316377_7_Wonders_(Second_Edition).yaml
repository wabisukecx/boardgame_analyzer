description: '7 Wonders

  The board game with more awards than any other game on the planet.

  With over 30 international awards, and over a million copies sold throughout the
  world, rediscover 7 Wonders, the game which has won more awards than any other game
  in the world, in a whole new version.   Lauded by both the public and critics, 7
  Wonders has claimed its place as an unmissable reference point in modern board gaming.
  7 Wonders is based on a simple and elegant mechanic (drafting) which allows up to
  7 players to play with no dead time. Players make their choice and apply all of
  them at the same time. These choices are varied and their impact is real. Finally,
  the game is divided into 3 Ages which little by little increase the importance of
  these choices and thus the tension in the game. The global mechanics and the care
  given to the artwork are used to immerse the player in Antiquity and have contributed
  to the game&rsquo;s success.

  A game plays out over 3 rounds, called Ages, during which you simultaneously play
  cards, one at a time, to develop your City.


  These cards represent the various Buildings you can construct: resource producers,
  civilian, commercial, military, scientific structures, and guilds.


  At the end of each Age, you go to war with your nearest neighbours. At the end of
  all 3 Ages, you tally up all of the victory points earned by your City, your wonder,
  your military prowess, and your treasury. The player with the highest score wins
  the game.


  Content:

  7 Wonder boards

  148 Age cards: 49 Age I cards, 49 Age II cards, and 50 Age III cards

  78 Coins: 54 Coins of value 1, and 24 Coins of value 3

  48 Military Conflict tokens: 24 Defeats and 24 Victories (8 per Age)

  1 pad of score sheets

  3 quick reference sheets describing the effects of the cards

  1 List of cards and chaining leaflet

  1 rulebook


  '
description_ja: '7 Wonders

  地球上のどのゲームよりも多くの賞を受賞したボードゲーム。

  30を超える国際的な賞を受賞し、世界中で100万部以上を売り上げた7 Wondersを、全く新しいバージョンで再発見してください。7 Wondersは、世界で最も多くの賞を受賞したゲームです。一般の人々からも批評家からも絶賛され、7
  Wondersは現代ボードゲームにおいて見逃せない基準点としての地位を確立しました。7 Wondersは、シンプルでエレガントなメカニズム（ドラフト）に基づいており、最大7人のプレイヤーが待ち時間なしでプレイできます。プレイヤーは選択を行い、それら全てを同時に適用します。これらの選択は多様であり、その影響は現実的です。最後に、ゲームは3つの時代に分かれており、これらの選択の重要性が徐々に増し、ゲーム内の緊張感が高まります。グローバルなメカニズムとアートワークへの配慮は、プレイヤーを古代に没入させ、ゲームの成功に貢献しています。


  ゲームは3つのラウンド（時代）を通して進行し、その間、あなたはカードを1枚ずつ同時にプレイして、自分の都市を発展させます。


  これらのカードは、資源生産者、市民、商業、軍事、科学構造物、ギルドなど、建設できる様々な建物を表しています。


  各時代の終わりに、あなたは最も近い隣国と戦争をします。3つの時代全てが終わると、あなたの都市、あなたのワンダー、あなたの軍事的腕前、そしてあなたの財産によって獲得した全ての勝利点を集計します。最も高いスコアを獲得したプレイヤーがゲームに勝利します。


  内容物：

  7つのワンダーボード

  148枚の時代カード：49枚の第1時代カード、49枚の第2時代カード、50枚の第3時代カード

  78枚のコイン：54枚の価値1のコイン、24枚の価値3のコイン

  48個の軍事紛争トークン：24個の敗北と24個の勝利（各時代8個）

  1冊のスコアシート

  カードの効果を説明する3枚のクイックリファレンスシート

  1枚のカードリストと連鎖リーフレット

  1冊のルールブック'
