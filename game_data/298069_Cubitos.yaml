description: 'Be fast or be last!


  In Cubitos, players take on the role of participants in the annual Cube Cup, a race
  of strategy and luck to determine the Cubitos Champion. Each player has a runner
  on the racetrack and a support team, which is represented by all the dice you roll.
  Each turn, you roll dice and use their results to move along the racetrack, buy
  new dice, and use abilities &mdash; but you must be careful not to push your luck
  rolling too much or you could bust!


  &mdash;description from the publisher


  '
description_ja: '速くなければ、負けだ！


  『キュビトス』では、プレイヤーは毎年恒例のキューブカップの参加者となり、戦略と運を駆使してキュビトスチャンピオンを目指します。各プレイヤーはレーストラック上のランナーと、振るすべてのダイスで表現されるサポートチームを持っています。毎ターン、ダイスを振り、その結果を使ってレーストラックを進み、新しいダイスを購入し、能力を使用します。しかし、運試しをしすぎて失敗しないように注意が必要です！'
