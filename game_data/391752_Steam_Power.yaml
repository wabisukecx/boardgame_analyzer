description: 'In Steam Power, players "race" to build the best rail network to meet
  their contractual obligations and make the most money.


  On your turn, you can perform two actions from a selection of choices, letting you
  lay tracks, build factories, fulfill contracts, earn money, or collect more contracts.
  Building a factory brings resources to the board that all players have access to...at
  a price.


  The game ends when a certain number of contracts are fulfilled, which varies by
  player count. The player with the most points (and money, which converts to points)
  wins.


  '
description_ja: '『スチームパワー』では、プレイヤーは契約上の義務を果たし、最大限の利益を上げるために、最高の鉄道網を構築する「競争」を繰り広げます。


  自分の番には、線路を敷設したり、工場を建設したり、契約を履行したり、お金を稼いだり、より多くの契約を獲得したりと、様々な選択肢の中から2つのアクションを実行できます。工場を建設すると、すべてのプレイヤーがアクセスできるリソースがボード上にもたらされます...ただし、それなりの代償が必要です。


  ゲームは、プレイヤー数によって異なる一定数の契約が履行された時点で終了します。最も多くのポイント（と、ポイントに換算されるお金）を獲得したプレイヤーが勝利します。'
