description: 'Rummikub is similar to several central European card games which are
  played with two decks of playing cards, including Machiavelli and Vatikan. Ephraim
  Hertzano invented the tile game Rummikub in the 1940s when card-playing was outlawed
  under the Communist regime. After World War II, Hertzano immigrated to British Mandate
  of Palestine (now Israel) and developed the first sets with his family. Over the
  years, the Hertzano family licensed it to other countries and Rummikub became Israel''s
  best-selling export game.


  Hertzano''s Official Rummikub Book, published in 1978, describes three different
  versions of the game: American, Sabra, and International. Modern Rummikub sets include
  only the Sabra version rules, with no mention of the others, and there are variations
  in the rules between publishers.


  In Turkey, the game is known as Okey and is widely played by families at gatherings
  or at local cafes.


  Like Rummy that you play with cards, you try to get rid of all your tiles by forming
  numbers into runs of 3 tiles or more, or 3 to 4 of a kind. The colors of the numbers
  on the tiles are like card suits. This game may start rather uneventfully, but when
  the players start putting more and more tiles in play, the options for your upcoming
  turns can become more complex, challenging, and exciting (from areyougame.com).


  '
description_ja: 'ラミィキューブは、マキャベリやヴァチカンといった、2組のトランプを使ってプレイされる中央ヨーロッパのカードゲームに似ています。エフライム・ヘルツァノは、共産主義政権下でカード遊びが禁止されていた1940年代に、タイルゲームのラミィキューブを発明しました。第二次世界大戦後、ヘルツァノはイギリス委任統治領パレスチナ（現在のイスラエル）に移住し、家族とともに最初のセットを開発しました。長年にわたり、ヘルツァノ家は他の国にライセンスを供与し、ラミィキューブはイスラエルで最も売れている輸出ゲームとなりました。


  1978年に出版されたヘルツァノの公式ラミィキューブブックには、アメリカ版、サブラ版、国際版の3つの異なるバージョンが記述されています。現代のラミィキューブセットにはサブラ版のルールのみが含まれており、他のバージョンについては言及されていません。また、出版社によってルールのバリエーションが存在します。


  トルコでは、このゲームはオケイとして知られており、家族の集まりや地元のカフェで広くプレイされています。


  カードで遊ぶラミーのように、3枚以上のタイルで連番を作るか、3枚または4枚同じ数字のセットを作って、手持ちのタイルをすべてなくすことを目指します。タイルの数字の色は、カードのスートのようなものです。このゲームは最初は退屈に感じるかもしれませんが、プレイヤーがより多くのタイルをプレイに出し始めると、次の自分の番の選択肢は、より複雑で、やりがいがあり、エキサイティングなものになります（areyougame.comより）。'
