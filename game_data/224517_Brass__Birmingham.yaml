description: 'Brass: Birmingham is an economic strategy game sequel to Martin Wallace''s
  2007 masterpiece, Brass. Brass: Birmingham tells the story of competing entrepreneurs
  in Birmingham during the industrial revolution between the years of 1770 and 1870.


  It offers a very different story arc and experience from its predecessor. As in
  its predecessor, you must develop, build and establish your industries and network
  in an effort to exploit low or high market demands. The game is played over two
  halves: the canal era (years 1770-1830) and the rail era (years 1830-1870). To win
  the game, score the most VPs. VPs are counted at the end of each half for the canals,
  rails and established (flipped) industry tiles.


  Each round, players take turns according to the turn order track, receiving two
  actions to perform any of the following actions (found in the original game):


  1) Build - Pay required resources and place an industry tile.

  2) Network - Add a rail / canal link, expanding your network.

  3) Develop - Increase the VP value of an industry.

  4) Sell - Sell your cotton, manufactured goods and pottery.

  5) Loan - Take a &pound;30 loan and reduce your income.


  Brass: Birmingham also features a new sixth action:


  6) Scout - Discard three cards and take a wild location and wild industry card.
  (This action replaces Double Action Build in original Brass.)


  '
description_ja: 'ブラス：バーミンガムは、マーティン・ウォレスの2007年の傑作ブラスの経済戦略ゲームの続編です。ブラス：バーミンガムは、1770年から1870年の産業革命期のバーミンガムで、しのぎを削る起業家たちの物語を描きます。


  前作とは大きく異なるストーリー展開と体験を提供します。前作と同様に、市場の需要が高いか低いかに応じて、産業を発展させ、建設し、確立し、ネットワークを構築する必要があります。ゲームは、運河時代（1770年〜1830年）と鉄道時代（1830年〜1870年）の2つの時代にわたってプレイされます。ゲームに勝利するには、最も多くの勝利点を獲得する必要があります。勝利点は、各時代の終了時に、運河、鉄道、および確立された（裏返された）産業タイルに対してカウントされます。


  各ラウンドでは、プレイヤーは順番トラックに従って順番に手番を行い、次のアクション（オリジナルゲームにあったもの）のうち2つを実行できます。


  1）建設 - 必要な資源を支払い、産業タイルを配置します。

  2）ネットワーク - 鉄道/運河リンクを追加し、ネットワークを拡大します。

  3）発展 - 産業の勝利点価値を高めます。

  4）販売 - 綿、工業製品、陶器を販売します。

  5）融資 - 30ポンドの融資を受け、収入を減らします。


  ブラス：バーミンガムには、新しい6番目のアクションもあります。


  6）偵察 - 3枚のカードを捨てて、ワイルドな場所カードとワイルドな産業カードを受け取ります。（このアクションは、オリジナルのブラスの「ダブルアクション建設」に代わるものです。）'
