description: 'Northwest India at the beginning of the 18th century. The rule of the
  Grand Moguls is waning, and the Maharishis and princes seize the opportunity to
  take control of the region. By influencing the prominent forces, building magnificent
  palaces, and ensuring a steady supply of commodities, the princes increase their
  power until the most successful has won.


  The goal of the game is to gain the most influence points. These can be obtained
  by building palaces and by acquiring commodities. A palace can be built after securing
  the support of the Vizier, the General, the Monk, the Princess, or the Grand Mogul.
  Commodities are gained by seizing control of a region or by retrieving them on a
  space where a palace has just been built.


  There are twelve turns with an auction for the region control and the support of
  the Vizier, General, Monk, Princess, and Grand Mogul, each represented by a different
  symbol. Players use cards in four colors to bid for the various prizes, and each
  player may only play one color in any given turn. During your turn you can either
  increase your bid by playing more cards or withdraw. When you do, you gain the reward
  for every symbol you have the majority of. You place palaces, gain region tiles,
  and increase your score accordingly. There are bonus points for connecting palaces
  over several regions on the map.After the final area on the board is auctioned,
  the player with the highest point total wins the game.


  This game is #3 in the Alea big box series.


  Note: the 2018 edition from Fantasy Flight Games includes rules for 2 players. You
  use only the cards included in the game, so no additional components are required.
  Anyone could use these rules with any version of the game.


  '
description_ja: '18世紀初頭の北西インド。大ムガル帝国の支配は衰退し、マハラジャや王子たちはこの機会に乗じて地域の支配権を握ろうとします。有力な勢力に影響を与え、壮麗な宮殿を建設し、物資の安定供給を確保することで、王子たちは自らの権力を増大させ、最終的に最も成功した者が勝利を収めます。


  ゲームの目的は、最も多くの影響力ポイントを獲得することです。影響力ポイントは、宮殿の建設や物資の獲得によって得られます。宮殿は、宰相、将軍、僧侶、王女、または大ムガル帝の支持を得た後に建設できます。物資は、地域の支配権を奪うか、宮殿が建設されたばかりのスペースで回収することによって獲得できます。


  ゲームは12ターンで構成され、地域支配と、それぞれ異なるシンボルで表される宰相、将軍、僧侶、王女、大ムガル帝の支持をかけて競りが行われます。プレイヤーは4色のカードを使って様々な賞品に入札し、各プレイヤーは1ターンに1色しか使用できません。自分のターンには、より多くのカードをプレイして入札額を増やすか、撤退することができます。撤退すると、自分が多数派を占めているシンボルごとに報酬が得られます。宮殿を配置し、地域タイルを獲得し、それに応じてスコアを増やします。マップ上の複数の地域に宮殿を接続すると、ボーナスポイントが得られます。ボード上の最後のエリアが競売にかけられた後、合計ポイントが最も高いプレイヤーがゲームに勝利します。


  このゲームは、aleaのビッグボックスシリーズの第3弾です。


  注：Fantasy Flight Gamesの2018年版には、2人プレイ用のルールが含まれています。ゲームに含まれているカードのみを使用するため、追加のコンポーネントは必要ありません。どのバージョンのゲームでも、これらのルールを使用できます。'
