description: 'Maracaibo, a strategy game for 1-4 players by Alexander Pfister, is
  set in the Caribbean during the 17th century. The players try to increase their
  influence in three nations in four rounds with a play time of 40 minutes per player.


  The players sail on a round course through the Caribbean, e.g., you have city tiles
  where you are able to perform various&nbsp;actions or deliver goods to. One special
  feature is an implemented quest mode over more and various tiles, which tells the
  player, who chase after it, a little story.


  As a player, you move with your ship around the course, managing it by using cards
  like in other games from Alexander Pfister.



  NOTE: The Spanish and Portuguese editions of Maracaibo contain La Armada mini-expansion
  packaged inside the base game''s box.


  '
description_ja: '『マラカイボ』は、アレクサンダー・プフィスターによる1〜4人用の戦略ゲームです。舞台は17世紀のカリブ海。プレイヤーは4ラウンドを通して、3つの国の勢力拡大を目指します。プレイ時間は1人あたり40分です。


  プレイヤーはカリブ海を周回する航路を船で進みます。都市タイルでは、さまざまなアクションを実行したり、物資を届けたりすることができます。特徴的なのは、複数のタイルにまたがるクエストモードです。これを追いかけることで、プレイヤーは小さな物語を体験できます。


  プレイヤーは船を航路に沿って移動させ、アレクサンダー・プフィスターの他のゲームと同様に、カードを使って船を操ります。


  注：『マラカイボ』のスペイン語版とポルトガル語版には、拡張セット「ラ・アルマダ」が基本ゲームの箱に同梱されています。'
