description: 'Welcome to the Rococo era during the reign of Louis XV when it&rsquo;s
  safe to say that holding lavish balls is quite trendy. Important personalities wrap
  up in noble coats and dresses, anxious to outshine one another. As the biggest event
  is coming up in just a few weeks, everyone is turning to you with their requests:
  an elegant coat here, a stunning dress there, or a donation to fund the fireworks
  at the event. Soon you realize that it&rsquo;s not just about your dressmaking business
  anymore &mdash; it&rsquo;s about managing the most prestigious ball of the era&hellip;and
  now it&rsquo;s time to roc(k)!


  Rococo is a Eurostyle board game with an interesting take on deck-building. Each
  turn you play one of your employee cards and let that employee perform a task: hire
  a new employee, buy resources, manufacture a coat or dress, or invest in the ball&rsquo;s
  decorations. But not every employee is up to every task, so you must choose and
  lead your employees wisely &mdash; especially since each employee grants a unique
  bonus and some of these bonuses generate prestige points.


  After seven rounds, the game ends with the big ball and a final scoring. Then you
  gain prestige points for certain employee bonuses and for coats and dresses that
  you rent out to guests at the ball as well as for decorations that you funded. The
  player who collected the most prestige points wins.


  '
description_ja: '時はルイ15世の時代、ロココの華やかなる頃。贅を凝らした舞踏会を開くことが流行していた。高貴な衣装に身を包んだ名士たちは、互いに輝きを競い合っている。数週間後に控えた最大のイベントに向けて、誰もがあなたに依頼を持ちかけてくる。優雅なコート、見事なドレス、そして舞踏会を彩る花火への出資…。やがてあなたは、これが単なるドレス作りビジネスではなく、時代で最も名誉ある舞踏会を運営することだと気づく。いよいよ、ロココ（roc）する時だ！


  ロココは、デッキ構築に趣向を凝らしたユーロスタイルのボードゲーム。毎ターン、あなたは従業員カードを1枚プレイし、その従業員に仕事をさせる。新しい従業員を雇ったり、資源を購入したり、コートやドレスを製造したり、舞踏会の装飾に投資したり。しかし、すべての従業員がすべての仕事に向いているわけではない。従業員を賢く選択し、指揮しなければならない。なぜなら、各従業員は独自のボーナスを与え、そのボーナスの一部は名声ポイントを生み出すからだ。


  7ラウンド後、ゲームは盛大な舞踏会と最終得点計算で終了する。舞踏会のゲストに貸し出したコートやドレス、資金提供した装飾、そして特定の従業員ボーナスによって名声ポイントを獲得する。最も多くの名声ポイントを集めたプレイヤーが勝利する。'
